# Herdr config — mirrors ~/.config/tmux/tmux.conf hotkeys.
# Docs: https://herdr.dev/docs/keyboard/ and /docs/configuration/#keybindings
# Note the tmux<->herdr naming: tmux `split-window -v` (stacked) == herdr
# `split_horizontal`; tmux `-h` (side-by-side) == herdr `split_vertical`.
# tmux "windows" == herdr "tabs".

[keys]
# tmux: `set -g prefix C-Space`
prefix = "ctrl+space"

# Splits open in the current pane's directory automatically in herdr.
# tmux: `bind v split-window -h` (side by side)  -> herdr default already prefix+v
split_vertical = "prefix+v"
# tmux: `bind s split-window -v` (stacked). Keep herdr default prefix+minus too.
split_horizontal = ["prefix+minus", "prefix+s"]

# tmux windows == herdr tabs. herdr defaults kept + tmux keys added.
new_tab      = "prefix+c"                             # tmux: new-window (== herdr default)
rename_tab   = ["prefix+shift+t", "prefix+comma"]     # herdr default + tmux prefix+, rename-window
close_tab    = ["prefix+shift+x", "prefix+ampersand"] # herdr default + tmux prefix+& kill-window
previous_tab = ["prefix+p", "prefix+j"]               # tmux prefix+p previous-window (+ your `bind j`)
next_tab     = ["prefix+n", "prefix+k"]               # tmux prefix+n next-window (+ your `bind k`)

# Copy mode with vi motions. herdr's copy mode already uses vi keys:
# v / Space start selection, y / Enter copy, q / Esc leave — matching your
# `mode-keys vi` + v/y bindings and tmux-yank behavior.
copy_mode = "prefix+["

# Pane navigation on arrows (tmux prefix+arrows); primary nav is ctrl+h/j/k/l.
# herdr's default prefix+h/j/k/l are all dropped: j/k/l are tab nav / last_pane,
# and prefix+h is dropped too for a consistent arrows-only set.
focus_pane_left  = "prefix+left"
focus_pane_down  = "prefix+down"
focus_pane_up    = "prefix+up"
focus_pane_right = "prefix+right"

# Jump back to the previously focused pane. prefix+; is tmux's last-pane; prefix+l
# approximates tmux's last-window (herdr has no last-active-tab, so it's pane-level
# but crosses tabs); ctrl+\ / ctrl+backspace mirror vim-tmux-navigator's <C-\>.
last_pane = ["prefix+semicolon", "prefix+l", "ctrl+backslash", "ctrl+backspace"]
# Note: tmux's prefix+o (next pane) is NOT added — herdr keeps prefix+o for
# open_notification_target. cycle_pane_next stays on herdr's default prefix+tab.

# Swap the focused pane with a neighbour. herdr default prefix+shift+h/l kept +
# tmux prefix+{/} (left/right; herdr has only directional swaps, no order rotate).
swap_pane_left  = ["prefix+shift+h", "prefix+{"]
swap_pane_right = ["prefix+shift+l", "prefix+}"]

# tmux sessions == herdr workspaces. herdr defaults kept + tmux keys added.
detach           = ["prefix+q", "prefix+d"]        # herdr default + tmux prefix+d detach-client
rename_workspace = ["prefix+shift+w", "prefix+$"]  # herdr default + tmux prefix+$ rename-session

# Navigate mode (the workspace picker opened with prefix+w): switch workspaces
# with ctrl+j/k (arrows still work too). Plain h/j/k/l stay as pane selection,
# so no collision — ctrl+j/k are free in navigate mode.
navigate_workspace_up   = ["ctrl+k", "up"]
navigate_workspace_down = ["ctrl+j", "down"]

# vim-tmux-navigator replacement: plain Ctrl+h/j/k/l. herdr-nav.sh forwards the
# key into (n)vim when it's the focused pane's foreground process, otherwise
# moves between herdr panes. Trade-off: while these are bound, Ctrl+h/j/k/l no
# longer reach a plain shell as backspace/newline/kill-line/clear.
[[keys.command]]
key = "ctrl+h"
type = "shell"
command = "~/.config/herdr/herdr-nav.sh left"
description = "vim-aware focus/pane left"

[[keys.command]]
key = "ctrl+j"
type = "shell"
command = "~/.config/herdr/herdr-nav.sh down"
description = "vim-aware focus/pane down"

[[keys.command]]
key = "ctrl+k"
type = "shell"
command = "~/.config/herdr/herdr-nav.sh up"
description = "vim-aware focus/pane up"

[[keys.command]]
key = "ctrl+l"
type = "shell"
command = "~/.config/herdr/herdr-nav.sh right"
description = "vim-aware focus/pane right"

# tmux: popup toggle on `M-p` (display-popup scratch session).
# herdr popups run a command; exit the shell to close it.
[[keys.command]]
key = "alt+p"
type = "popup"
command = "exec \"${SHELL:-sh}\""
description = "scratch popup terminal"
width = "80%"
height = "80%"
